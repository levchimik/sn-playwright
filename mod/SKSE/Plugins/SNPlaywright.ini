[Behavior]
; Pause the game while the panel is focused.
;   0 = world keeps running (default) — direct the scene live, NPCs keep acting.
;   1 = freeze the game while the panel is open.
PauseGame=0

; Steal keyboard input from other mods while the panel is open (and not in look mode).
; Recommended ON: the panel is a keyboard-driven director console, so its keys (letters
; to compose a line, etc.) must NOT also trigger other mods' RegisterForKey hotkeys.
; Escape and right-mouse look are never stolen, and the panel still composes normally
; (CEF delivers keys to the view independently of the game input list).
;   1 = capture all keys while the panel is open (default).
;   0 = capture only the panel's navigation keys; other keys still reach gameplay/mods.
CaptureKeys=1
